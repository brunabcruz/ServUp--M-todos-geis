<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Profissional - ServUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1b498e;
            --secondary-blue: #3a82f7;
            --accent-green: #1c7354;
            --bg-light-blue: #f0f5ff;
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --star-color: #f3c623;
            --bg-body: #f8fafc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-body); color: var(--text-dark); }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }

        .header-logo img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .back-btn:hover { color: white; }

        .page-wrapper {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* HERO CARD */
        .profile-hero {
            background: var(--white);
            border-radius: 24px;
            border: 1px solid #edf2f7;
            overflow: hidden;
        }

        .profile-cover {
            height: 140px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
        }

        .profile-body {
            padding: 0 32px 32px;
            display: flex;
            gap: 24px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .profile-photo-wrap {
            margin-top: -50px;
            flex-shrink: 0;
        }

        .profile-photo {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .profile-info { flex: 1; padding-top: 16px; min-width: 200px; }
        .profile-info h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }

        .profile-profession {
            color: var(--secondary-blue);
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .profile-meta span { display: flex; align-items: center; gap: 6px; }

        .rating-stars { color: var(--star-color); }

        .hire-btn {
            background: var(--secondary-blue);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            align-self: flex-end;
            margin-top: 16px;
        }
        .hire-btn:hover { background: var(--primary-blue); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(58,130,247,0.25); }

        /* CARDS GENÉRICOS */
        .card {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid #edf2f7;
            padding: 28px 32px;
        }

        .card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i { color: var(--secondary-blue); font-size: 1rem; }

        /* SOBRE */
        .about-text { color: var(--text-muted); line-height: 1.75; font-size: 0.95rem; }

        /* SERVIÇOS */
        .services-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .service-item {
            background: var(--bg-body);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            border: 1px solid #edf2f7;
        }

        .service-item i { color: var(--secondary-blue); width: 16px; text-align: center; }

        /* DISPONIBILIDADE */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            text-align: center;
            border-radius: 12px;
            padding: 12px 6px;
            font-size: 0.8rem;
        }

        .day-cell .day-name { font-weight: 600; margin-bottom: 6px; color: var(--text-dark); }
        .day-cell .day-status { font-size: 0.75rem; }

        .day-cell.available { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .day-cell.available .day-status { color: #16a34a; }
        .day-cell.unavailable { background: #f8fafc; border: 1px solid #e2e8f0; }
        .day-cell.unavailable .day-status { color: #cbd5e1; }

        /* AVALIAÇÕES */
        .reviews-list { display: flex; flex-direction: column; gap: 16px; }

        .review-item {
            padding: 18px;
            background: var(--bg-body);
            border-radius: 14px;
            border: 1px solid #edf2f7;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .reviewer-name { font-weight: 600; font-size: 0.9rem; }
        .review-date { font-size: 0.78rem; color: var(--text-muted); }
        .review-stars { color: var(--star-color); font-size: 0.8rem; margin-bottom: 6px; }
        .review-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-box {
            background: var(--white);
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-box .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--primary-blue); }
        .stat-box .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

        @media (max-width: 640px) {
            header { padding: 15px 20px; }
            .profile-body { padding: 0 20px 24px; }
            .card { padding: 20px; }
            .schedule-grid { grid-template-columns: repeat(4, 1fr); }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

function renderStars(rating) {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5;
    let html = '';
    for (let i = 0; i < full; i++) html += '<i class="fa-solid fa-star"></i>';
    if (half) html += '<i class="fa-solid fa-star-half-stroke"></i>';
    return html;
}

function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('worker') || 'ricardo';
    const w = workers[id];
    if (!w) { document.body.innerHTML = '<p style="padding:40px">Profissional não encontrado.</p>'; return; }

    document.title = `${w.name} - ServUp`;
    document.getElementById('profile-cover').style.background = w.coverColor;
    document.getElementById('profile-photo').src = w.photo;
    document.getElementById('profile-photo').alt = w.name;
    document.getElementById('profile-name').textContent = w.name;
    document.getElementById('profile-profession').textContent = w.profession;
    document.getElementById('profile-stars').innerHTML = renderStars(w.rating);
    document.getElementById('profile-rating').textContent = w.rating.toFixed(1);
    document.getElementById('profile-reviews-count').textContent = w.reviewsCount;
    document.getElementById('profile-location').textContent = w.location;
    document.getElementById('profile-experience').textContent = w.experience;
    document.getElementById('hire-link').href = `contratar.html?worker=${id}`;

    document.getElementById('stat-jobs').textContent = w.stats.jobs;
    document.getElementById('stat-rating').textContent = w.stats.rating;
    document.getElementById('stat-repeat').textContent = w.stats.repeat;

    document.getElementById('profile-about').textContent = w.about;

    const servicesList = document.getElementById('services-list');
    w.services.forEach(s => {
        servicesList.innerHTML += `<div class="service-item"><i class="fa-solid fa-check"></i> ${s}</div>`;
    });

        scheduleGrid.innerHTML += `
            <div class="day-cell ${available ? 'available' : 'unavailable'}">
                <div class="day-name">${day}</div>
                <div class="day-status">${available ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-xmark"></i>'}</div>
            </div>`;
    });

    const reviewsList = document.getElementById('reviews-list');
    w.reviews.forEach(r => {
        let stars = '';
        for (let i = 0; i < r.stars; i++) stars += '<i class="fa-solid fa-star"></i>';
        reviewsList.innerHTML += `
            <div class="review-item">
                <div class="review-header">
                    <span class="reviewer-name">${r.name}</span>
                    <span class="review-date">${r.date}</span>
                </div>
                <div class="review-stars">${stars}</div>
                <p class="review-text">${r.text}</p>
            </div>`;
    });
}

init();
</script>
</body>
</html>
